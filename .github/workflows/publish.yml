name: Publish to PyPI

# Builds and publishes the package when a GitHub Release is published.
# `workflow_dispatch` lets you publish manually (used for the first release,
# whose GitHub Release predates this workflow).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Must match the environment configured on the PyPI trusted publisher.
    environment:
      name: pypi
      url: https://pypi.org/project/yt-tutor/
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing (no API token needed)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
